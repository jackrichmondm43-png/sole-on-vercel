<html lang="en">
<head>
<meta charset="UTF-8" />

<!-- Ultraviolet proxy scripts -->

<script src="/uv/uv.config.js"></script>
<script>

<style>
  :root {
    --white: #ffffff;
    --off-white: rgba(255,255,255,0.85);
    --glow: rgba(255,255,255,0.6);
    --glass-bg: rgba(255,255,255,0.04);
    --glass-border: rgba(255,255,255,0.12);
    --glass-hover: rgba(255,255,255,0.09);
    --bar-bg: rgba(20,20,20,0.7);
    --neon-white: #ffffff;
    --neon-shadow: 0 0 8px rgba(255,255,255,0.9), 0 0 20px rgba(255,255,255,0.4);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: #000;
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    height: 100vh;
    overflow: hidden;
    cursor: default;
    user-select: none;
  }

  /* ── STAR FIELD ── */
  canvas#stars {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* ── BUBBLES ── */
  #bubbles {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    overflow: hidden;
  }

  .bubble {
    position: absolute;
    bottom: -120px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.18), rgba(255,255,255,0.03));
    border: 1px solid rgba(255,255,255,0.15);
    backdrop-filter: blur(2px);
    animation: floatUp linear infinite;
    box-shadow: inset 0 0 12px rgba(255,255,255,0.06), 0 0 8px rgba(255,255,255,0.05);
  }

  /* Triangle bubble */
  .bubble.tri {
    border-radius: 0;
    clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
    background: rgba(255,255,255,0.05);
    border: none;
  }

  /* Square bubble */
  .bubble.sq {
    border-radius: 4px;
  }

  @keyframes floatUp {
    0%   { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
    10%  { opacity: 1; }
    80%  { opacity: 0.6; }
    100% { transform: translateY(-110vh) translateX(var(--drift)) rotate(var(--spin)); opacity: 0; }
  }

  /* ── MAIN CONTENT ── */
  #app {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    padding-bottom: 80px;
  }

  /* ── TITLE ── */
  .title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(2.4rem, 6vw, 4rem);
    letter-spacing: 0.18em;
    text-transform: lowercase;
    color: var(--white);
    text-shadow: var(--neon-shadow);
    margin-bottom: 0.3rem;
    animation: glowPulse 3s ease-in-out infinite;
  }

  @keyframes glowPulse {
    0%, 100% { text-shadow: 0 0 8px rgba(255,255,255,0.9), 0 0 20px rgba(255,255,255,0.4); }
    50%       { text-shadow: 0 0 14px rgba(255,255,255,1), 0 0 40px rgba(255,255,255,0.6), 0 0 60px rgba(255,255,255,0.2); }
  }

  /* ── CLOCK ── */
  #clock {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: clamp(2.8rem, 8vw, 5.5rem);
    color: var(--white);
    letter-spacing: 0.05em;
    margin: 0.6rem 0 0.25rem;
    text-shadow: 0 0 30px rgba(255,255,255,0.3);
  }

  #battery {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.08em;
    font-weight: 300;
    margin-bottom: 0.2rem;
  }

  /* ── CREDITS ── */
  .credits {
    font-size: 0.72rem;
    color: rgba(255,255,255,0.25);
    letter-spacing: 0.12em;
    margin-top: 0.5rem;
    font-weight: 300;
  }

  /* ── BOTTOM BAR ── */
  #taskbar {
    position: fixed;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 50;
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bar-bg);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    padding: 10px 14px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 4px 30px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08);
  }

  .bar-btn {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    color: rgba(255,255,255,0.7);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.2s ease;
    font-size: 1.1rem;
    backdrop-filter: blur(10px);
    position: relative;
    overflow: hidden;
  }

  .bar-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 12px;
    background: radial-gradient(circle at center, rgba(255,255,255,0.15) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .bar-btn:hover {
    background: var(--glass-hover);
    border-color: rgba(255,255,255,0.3);
    color: #fff;
    box-shadow: 0 0 14px rgba(255,255,255,0.2), 0 0 30px rgba(255,255,255,0.08);
    transform: scale(1.08);
  }

  .bar-btn:hover::before { opacity: 1; }

  .bar-btn:active { transform: scale(0.96); }

  .bar-divider {
    width: 1px;
    height: 24px;
    background: rgba(255,255,255,0.1);
    margin: 0 2px;
  }

  /* ── BROWSE BAR at bottom ── */
  #browse-bar {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    z-index: 40;
    width: min(640px, 90vw);
    opacity: 0;
    pointer-events: none;
    transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  #browse-bar.open {
    opacity: 1;
    pointer-events: all;
    transform: translateX(-50%) translateY(0);
  }

  .browse-inner {
    display: flex;
    align-items: center;
    background: rgba(10,10,10,0.85);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 16px;
    padding: 10px 14px;
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    box-shadow: 0 0 40px rgba(255,255,255,0.06), 0 8px 32px rgba(0,0,0,0.6);
    gap: 10px;
  }

  #url-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 400;
    letter-spacing: 0.02em;
    caret-color: #fff;
  }

  #url-input::placeholder { color: rgba(255,255,255,0.3); }

  .go-btn {
    width: 34px;
    height: 34px;
    border-radius: 10px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .go-btn:hover {
    background: rgba(255,255,255,0.2);
    box-shadow: 0 0 12px rgba(255,255,255,0.25);
    transform: scale(1.05);
  }

  /* ── STARTUP BLOCKER ── */
  #startup-blocker {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    pointer-events: all;
  }

  /* ── TOP NOTIFICATION BANNER ── */
  #startup-banner {
    position: fixed;
    top: 0;
    left: 0; right: 0;
    z-index: 201;
    background: rgba(8,8,8,0.96);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 4px 40px rgba(0,0,0,0.8), 0 1px 0 rgba(255,255,255,0.07) inset;
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    padding: 20px 32px 22px;
    transform: translateY(-100%);
    animation: slideDown 0.5s cubic-bezier(0.34, 1.4, 0.64, 1) 0.2s forwards;
  }

  @keyframes slideDown {
    to { transform: translateY(0); }
  }

  .banner-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }

  .banner-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 0 8px rgba(255,255,255,0.9), 0 0 16px rgba(255,255,255,0.4);
    animation: dotPulse 2s ease-in-out infinite;
    flex-shrink: 0;
  }

  @keyframes dotPulse {
    0%,100% { box-shadow: 0 0 8px rgba(255,255,255,0.9), 0 0 16px rgba(255,255,255,0.4); }
    50%      { box-shadow: 0 0 14px rgba(255,255,255,1), 0 0 28px rgba(255,255,255,0.7); }
  }

  .banner-title {
    font-family: 'Syne', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.9);
  }

  .banner-sub {
    font-size: 0.72rem;
    color: rgba(255,255,255,0.3);
    margin-left: auto;
    letter-spacing: 0.06em;
  }

  .banner-options {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  .opt-btn {
    padding: 9px 16px;
    border-radius: 10px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.6);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    font-weight: 500;
    cursor: pointer;
    text-align: center;
    transition: all 0.18s ease;
    white-space: nowrap;
    position: relative;
    overflow: hidden;
  }

  .opt-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 10px;
    background: radial-gradient(circle at center, rgba(255,255,255,0.12) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.18s;
  }

  .opt-btn:hover::after { opacity: 1; }

  .opt-btn:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.3);
    color: #fff;
    box-shadow: 0 0 16px rgba(255,255,255,0.12), 0 0 4px rgba(255,255,255,0.05);
    transform: translateY(-1px) scale(1.03);
  }

  .opt-btn.selected {
    background: rgba(255,255,255,0.14);
    border-color: rgba(255,255,255,0.45);
    color: #fff;
    box-shadow: 0 0 20px rgba(255,255,255,0.15);
  }

  .banner-divider {
    width: 1px; height: 28px;
    background: rgba(255,255,255,0.1);
    flex-shrink: 0;
  }

  .enter-btn {
    padding: 9px 22px;
    border-radius: 10px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.25);
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.18s;
    text-transform: uppercase;
  }

  .enter-btn:hover {
    background: rgba(255,255,255,0.2);
    box-shadow: 0 0 20px rgba(255,255,255,0.2);
    transform: scale(1.04);
  }

  /* ── MODAL (for browse-triggered open) ── */
  #modal-overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(6px);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }

  #modal-overlay.show {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: rgba(12,12,12,0.92);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 28px 30px 22px;
    width: min(420px, 90vw);
    backdrop-filter: blur(30px);
    box-shadow: 0 0 60px rgba(255,255,255,0.06), 0 20px 60px rgba(0,0,0,0.8);
    transform: scale(0.95);
    transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  #modal-overlay.show .modal { transform: scale(1); }

  .modal h3 {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: rgba(255,255,255,0.9);
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }

  .modal p {
    font-size: 0.78rem;
    color: rgba(255,255,255,0.35);
    margin-bottom: 18px;
    line-height: 1.5;
  }

  .modal-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 20px;
  }

  .modal .opt-btn {
    padding: 10px 12px;
    text-align: left;
    line-height: 1.4;
  }

  .modal .opt-btn span {
    display: block;
    font-size: 0.68rem;
    color: rgba(255,255,255,0.3);
    margin-top: 1px;
  }

  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  .modal-btn {
    padding: 9px 20px;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s;
    border: 1px solid rgba(255,255,255,0.12);
  }

  .modal-btn.cancel {
    background: transparent;
    color: rgba(255,255,255,0.5);
  }

  .modal-btn.cancel:hover {
    color: #fff;
    background: rgba(255,255,255,0.05);
  }

  .modal-btn.confirm {
    background: rgba(255,255,255,0.12);
    color: #fff;
    border-color: rgba(255,255,255,0.25);
  }

  .modal-btn.confirm:hover {
    background: rgba(255,255,255,0.22);
    box-shadow: 0 0 16px rgba(255,255,255,0.15);
  }

  /* tooltip */
  .bar-btn[data-tip]:hover::after {
    content: attr(data-tip);
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: rgba(20,20,20,0.9);
    border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.8);
    font-size: 0.65rem;
    padding: 3px 8px;
    border-radius: 6px;
    white-space: nowrap;
    font-family: 'DM Sans', sans-serif;
    pointer-events: none;
  }
</style>

<script>
  // ── STARS ──
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function initStars() {
    stars = [];
    for (let i = 0; i < 180; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.2 + 0.2,
        a: Math.random(),
        speed: Math.random() * 0.004 + 0.001,
        twinkleOffset: Math.random() * Math.PI * 2
      });
    }
  }

  function drawStars(t) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      const alpha = 0.3 + 0.5 * Math.sin(t * s.speed * 60 + s.twinkleOffset);
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.fill();
    });
    requestAnimationFrame(drawStars);
  }

  window.addEventListener('resize', () => { resizeCanvas(); initStars(); });
  resizeCanvas(); initStars();
  requestAnimationFrame(drawStars);

  // ── BUBBLES ──
  const bubbleContainer = document.getElementById('bubbles');
  const shapes = ['circle', 'sq', 'tri'];

  function spawnBubble() {
    const el = document.createElement('div');
    const shape = shapes[Math.floor(Math.random() * shapes.length)];
    el.classList.add('bubble');
    if (shape === 'tri') el.classList.add('tri');
    if (shape === 'sq') el.classList.add('sq');

    const size = Math.random() * 55 + 12;
    const left = Math.random() * 100;
    const duration = Math.random() * 10 + 8;
    const delay = Math.random() * 4;
    const drift = (Math.random() - 0.5) * 120;
    const spin = (Math.random() - 0.5) * 360;

    el.style.cssText = `
      width:${size}px; height:${size}px;
      left:${left}%;
      animation-duration:${duration}s;
      animation-delay:${delay}s;
      --drift:${drift}px;
      --spin:${spin}deg;
      opacity:0;
    `;

    bubbleContainer.appendChild(el);
    setTimeout(() => el.remove(), (duration + delay) * 1000 + 200);
  }

  setInterval(spawnBubble, 700);
  for (let i = 0; i < 8; i++) spawnBubble();

  // ── CLOCK ──
  function updateClock() {
    const now = new Date();
    let h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    document.getElementById('clock').textContent =
      `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')} ${ampm}`;
  }
  updateClock();
  setInterval(updateClock, 1000);

  // ── BATTERY ──
  if (navigator.getBattery) {
    navigator.getBattery().then(b => {
      const update = () => {
        const pct = Math.round(b.level * 100);
        const charging = b.charging ? ' ⚡' : '';
        document.getElementById('battery').textContent = `Battery: ${pct}%${charging}`;
      };
      update();
      b.addEventListener('levelchange', update);
      b.addEventListener('chargingchange', update);
    });
  } else {
    document.getElementById('battery').textContent = '';
  }

  // ── STARTUP BANNER ──
  let startupMode = 'ab';

  function selectStartupMode(btn) {
    document.querySelectorAll('#startup-banner .opt-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    startupMode = btn.dataset.mode;
  }

  function confirmStartup() {
    selectedMode = startupMode;
    // Dismiss banner + blocker with animation
    const banner = document.getElementById('startup-banner');
    const blocker = document.getElementById('startup-blocker');
    banner.style.transition = 'transform 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.3s';
    banner.style.transform = 'translateY(-100%)';
    banner.style.opacity = '0';
    blocker.style.transition = 'opacity 0.4s';
    blocker.style.opacity = '0';
    setTimeout(() => {
      banner.remove();
      blocker.remove();
    }, 420);
  }

  // ── BROWSE BAR ──
  let browseOpen = false;
  function toggleBrowse() {
    browseOpen = !browseOpen;
    document.getElementById('browse-bar').classList.toggle('open', browseOpen);
    if (browseOpen) setTimeout(() => document.getElementById('url-input').focus(), 50);
  }

  document.getElementById('url-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') triggerGo();
    if (e.key === 'Escape') toggleBrowse();
  });
  document.getElementById('go-btn').addEventListener('click', triggerGo);

  let pendingUrl = '';

  function buildUrl(url) {
    // Route through Ultraviolet service worker
    return __uv$config.prefix + __uv$config.encodeUrl(url);
  }

  function triggerGo() {
    let val = document.getElementById('url-input').value.trim();
    if (!val) return;
    if (!/^https?:\/\//i.test(val)) {
      if (val.includes('.') && !val.includes(' ')) val = 'https://' + val;
     else val = 'https://duckduckgo.com/?q=' + encodeURIComponent(val);
    }
    pendingUrl = val;
    launchProxy();
  }

  // ── MODAL ──
  let selectedMode = 'ab';

  function openModal() {
    document.getElementById('modal-overlay').classList.add('show');
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('show');
  }

  function selectMode(btn) {
    document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedMode = btn.dataset.mode;
  }

  function launchProxy() {
    closeModal();
    const url = pendingUrl;
    if (!url) return;
    const proxied = buildUrl(url);

    switch (selectedMode) {
      case 'ab': {
        const w = window.open('about:blank', '_blank');
        if (w) {
          w.document.write(`<style>*{margin:0;padding:0}iframe{border:none;width:100vw;height:100vh}</style><iframe src="${proxied}" allowfullscreen></iframe>`);
          w.document.close();
        }
        break;
      }
      case 'blob': {
        const html = `<!DOCTYPE html><html><head><style>*{margin:0;padding:0}iframe{border:none;width:100vw;height:100vh}</style></head><body><iframe src="${proxied}" allowfullscreen></iframe></body></html>`;
        const blob = new Blob([html], { type: 'text/html' });
        window.open(URL.createObjectURL(blob), '_blank');
        break;
      }
      case 'iframe': {
        document.body.innerHTML = `<iframe src="${proxied}" style="border:none;width:100vw;height:100vh;position:fixed;inset:0;z-index:9999" allowfullscreen></iframe>`;
        break;
      }
      case 'ac': {
        const w = window.open('about:blank', '_blank');
        if (w) { w.location.href = proxied; }
        break;
      }
      case 'bc': {
        const html = `<!DOCTYPE html><html><body><script>location.href="${proxied}"<\/script></body></html>`;
        const blob = new Blob([html], { type: 'text/html' });
        window.open(URL.createObjectURL(blob), '_blank');
        break;
      }
      case 'mc': {
        location.href = proxied;
        break;
      }
    }
  }

  // Close browse bar clicking outside
  document.addEventListener('click', e => {
    if (browseOpen && !document.getElementById('browse-bar').contains(e.target) && e.target.id !== 'btn-browse') {
      browseOpen = false;
      document.getElementById('browse-bar').classList.remove('open');
    }
  });
</script>
</body>
</html>
