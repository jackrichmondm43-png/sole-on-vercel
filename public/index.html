<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>sole ツ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="/uv/uv.bundle.js"></script>
<script src="/uv/uv.config.js"></script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("/uv/sw.js", {
        scope: __uv$config.prefix,
      });
    });
  }
</script>
<style>
  :root {
    --white: #ffffff;
    --glass-bg: rgba(255,255,255,0.04);
    --glass-border: rgba(255,255,255,0.12);
    --glass-hover: rgba(255,255,255,0.09);
    --bar-bg: rgba(20,20,20,0.7);
    --neon-shadow: 0 0 8px rgba(255,255,255,0.9), 0 0 20px rgba(255,255,255,0.4);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: #000;
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    height: 100vh;
    overflow: hidden;
    cursor: default;
    user-select: none;
  }

  canvas#stars {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
  }

  #bubbles {
    position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden;
  }

  .bubble {
    position: absolute;
    bottom: -120px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.18), rgba(255,255,255,0.03));
    border: 1px solid rgba(255,255,255,0.15);
    backdrop-filter: blur(2px);
    animation: floatUp linear infinite;
    box-shadow: inset 0 0 12px rgba(255,255,255,0.06), 0 0 8px rgba(255,255,255,0.05);
  }
  .bubble.tri {
    border-radius: 0;
    clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
    background: rgba(255,255,255,0.05);
    border: none;
  }
  .bubble.sq { border-radius: 4px; }

  @keyframes floatUp {
    0%   { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
    10%  { opacity: 1; }
    80%  { opacity: 0.6; }
    100% { transform: translateY(-110vh) translateX(var(--drift)) rotate(var(--spin)); opacity: 0; }
  }

  #app {
    position: relative; z-index: 10;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100vh; padding-bottom: 80px;
  }

  .title {
    font-family: 'Syne', sans-serif; font-weight: 800;
    font-size: clamp(2.4rem, 6vw, 4rem); letter-spacing: 0.18em;
    text-transform: lowercase; color: var(--white);
    text-shadow: var(--neon-shadow); margin-bottom: 0.3rem;
    animation: glowPulse 3s ease-in-out infinite;
  }

  @keyframes glowPulse {
    0%, 100% { text-shadow: 0 0 8px rgba(255,255,255,0.9), 0 0 20px rgba(255,255,255,0.4); }
    50%       { text-shadow: 0 0 14px rgba(255,255,255,1), 0 0 40px rgba(255,255,255,0.6), 0 0 60px rgba(255,255,255,0.2); }
  }

  #clock {
    font-family: 'Syne', sans-serif; font-weight: 700;
    font-size: clamp(2.8rem, 8vw, 5.5rem); color: var(--white);
    letter-spacing: 0.05em; margin: 0.6rem 0 0.25rem;
    text-shadow: 0 0 30px rgba(255,255,255,0.3);
  }

  #battery {
    font-size: 0.85rem; color: rgba(255,255,255,0.45);
    letter-spacing: 0.08em; font-weight: 300; margin-bottom: 0.2rem;
  }

  .credits {
    font-size: 0.72rem; color: rgba(255,255,255,0.25);
    letter-spacing: 0.12em; margin-top: 0.5rem; font-weight: 300;
  }

  #taskbar {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    z-index: 50; display: flex; align-items: center; gap: 8px;
    background: var(--bar-bg); border: 1px solid var(--glass-border);
    border-radius: 20px; padding: 10px 14px;
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 4px 30px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08);
  }

  .bar-btn {
    width: 42px; height: 42px; border-radius: 12px;
    background: var(--glass-bg); border: 1px solid var(--glass-border);
    color: rgba(255,255,255,0.7);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.2s ease;
    backdrop-filter: blur(10px); position: relative; overflow: hidden;
  }
  .bar-btn::before {
    content: ''; position: absolute; inset: 0; border-radius: 12px;
    background: radial-gradient(circle at center, rgba(255,255,255,0.15) 0%, transparent 70%);
    opacity: 0; transition: opacity 0.2s;
  }
  .bar-btn:hover {
    background: var(--glass-hover); border-color: rgba(255,255,255,0.3); color: #fff;
    box-shadow: 0 0 14px rgba(255,255,255,0.2), 0 0 30px rgba(255,255,255,0.08);
    transform: scale(1.08);
  }
  .bar-btn:hover::before { opacity: 1; }
  .bar-btn:active { transform: scale(0.96); }

  .bar-divider { width: 1px; height: 24px; background: rgba(255,255,255,0.1); margin: 0 2px; }

  .bar-btn[data-tip]:hover::after {
    content: attr(data-tip);
    position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
    background: rgba(20,20,20,0.9); border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.8); font-size: 0.65rem; padding: 3px 8px;
    border-radius: 6px; white-space: nowrap; font-family: 'DM Sans', sans-serif; pointer-events: none;
  }

  #browse-bar {
    position: fixed; bottom: 80px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    z-index: 40; width: min(640px, 90vw);
    opacity: 0; pointer-events: none;
    transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  #browse-bar.open {
    opacity: 1; pointer-events: all; transform: translateX(-50%) translateY(0);
  }

  .browse-inner {
    display: flex; align-items: center;
    background: rgba(10,10,10,0.85); border: 1px solid rgba(255,255,255,0.18);
    border-radius: 16px; padding: 10px 14px;
    backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
    box-shadow: 0 0 40px rgba(255,255,255,0.06), 0 8px 32px rgba(0,0,0,0.6); gap: 10px;
  }

  #url-input {
    flex: 1; background: transparent; border: none; outline: none;
    color: #fff; font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem; caret-color: #fff;
  }
  #url-input::placeholder { color: rgba(255,255,255,0.3); }

  .go-btn {
    width: 34px; height: 34px; border-radius: 10px;
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
    color: #fff; display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.2s; flex-shrink: 0;
  }
  .go-btn:hover {
    background: rgba(255,255,255,0.2);
    box-shadow: 0 0 12px rgba(255,255,255,0.25); transform: scale(1.05);
  }
</style>
</head>
<body>

<canvas id="stars"></canvas>
<div id="bubbles"></div>

<div id="app">
  <div class="title">sole ツ</div>
  <div id="clock">--:--:--</div>
  <div id="battery">Battery: --</div>
  <div class="credits">@3auh | jack richman</div>
</div>

<div id="browse-bar">
  <div class="browse-inner">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
    <input id="url-input" type="text" placeholder="Search or enter a URL…" autocomplete="off" autocorrect="off" spellcheck="false"/>
    <button class="go-btn" id="go-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>
  </div>
</div>

<div id="taskbar">
  <button class="bar-btn" id="btn-browse" data-tip="Browse" onclick="toggleBrowse()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
  </button>
  <button class="bar-btn" data-tip="Games" onclick="alert('Games coming soon!')">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="4"/><path d="M6 12h4M8 10v4M15 11h2M15 13h2"/></svg>
  </button>
  <div class="bar-divider"></div>
  <button class="bar-btn" data-tip="Settings" onclick="alert('Settings coming soon!')">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a2 2 0 0 0-2.83 0l-.49.49A7.95 7.95 0 0 0 14 4.07V3a2 2 0 0 0-4 0v.07a7.95 7.95 0 0 0-1.75 1.35l-.49-.49a2 2 0 0 0-2.83 2.83l.49.49A7.95 7.95 0 0 0 4.07 9H3a2 2 0 0 0 0 4h.07a7.95 7.95 0 0 0 1.35 1.75l-.49.49a2 2 0 0 0 2.83 2.83l.49-.49A7.95 7.95 0 0 0 10 19.93V21a2 2 0 0 0 4 0v-.07a7.95 7.95 0 0 0 1.75-1.35l.49.49a2 2 0 0 0 2.83-2.83l-.49-.49A7.95 7.95 0 0 0 19.93 14H21a2 2 0 0 0 0-4h-.07a7.95 7.95 0 0 0-1.35-1.75l.49-.49a2 2 0 0 0 0-2.83z"/></svg>
  </button>
  <button class="bar-btn" data-tip="Add" onclick="alert('Shortcuts coming soon!')">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
  </button>
</div>

<script>
  // ── SELECTED MODE — declared first so prompt can set it ──
  let selectedMode = 'ab';

  // ── STARTUP NATIVE PROMPT ──
  (function() {
    const choice = prompt(
      "sole ツ — choose how to open:\n\n" +
      "'a'  = about:blank\n" +
      "'b'  = blob cloaking\n" +
      "'m'  = current tab iframe\n" +
      "'ac' = about:blank & tab anchor\n" +
      "'bc' = blob cloaking & anchor\n" +
      "'mc' = current tab & tab anchor"
    );
    const map = { a:'ab', b:'blob', m:'iframe', ac:'ac', bc:'bc', mc:'mc' };
    selectedMode = map[choice?.toLowerCase().trim()] || 'ab';
  })();

  // ── STARS ──
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function initStars() {
    stars = [];
    for (let i = 0; i < 180; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.2 + 0.2,
        speed: Math.random() * 0.004 + 0.001,
        twinkleOffset: Math.random() * Math.PI * 2
      });
    }
  }

  function drawStars(t) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      const alpha = 0.3 + 0.5 * Math.sin(t * s.speed * 60 + s.twinkleOffset);
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.fill();
    });
    requestAnimationFrame(drawStars);
  }

  window.addEventListener('resize', () => { resizeCanvas(); initStars(); });
  resizeCanvas(); initStars();
  requestAnimationFrame(drawStars);

  // ── BUBBLES ──
  const bubbleContainer = document.getElementById('bubbles');
  const shapes = ['circle', 'sq', 'tri'];

  function spawnBubble() {
    const el = document.createElement('div');
    const shape = shapes[Math.floor(Math.random() * shapes.length)];
    el.classList.add('bubble');
    if (shape === 'tri') el.classList.add('tri');
    if (shape === 'sq') el.classList.add('sq');
    const size = Math.random() * 55 + 12;
    const left = Math.random() * 100;
    const duration = Math.random() * 10 + 8;
    const delay = Math.random() * 4;
    const drift = (Math.random() - 0.5) * 120;
    const spin = (Math.random() - 0.5) * 360;
    el.style.cssText = `width:${size}px;height:${size}px;left:${left}%;animation-duration:${duration}s;animation-delay:${delay}s;--drift:${drift}px;--spin:${spin}deg;opacity:0;`;
    bubbleContainer.appendChild(el);
    setTimeout(() => el.remove(), (duration + delay) * 1000 + 200);
  }

  setInterval(spawnBubble, 700);
  for (let i = 0; i < 8; i++) spawnBubble();

  // ── CLOCK ──
  function updateClock() {
    const now = new Date();
    let h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    document.getElementById('clock').textContent =
      `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')} ${ampm}`;
  }
  updateClock();
  setInterval(updateClock, 1000);

  // ── BATTERY ──
  if (navigator.getBattery) {
    navigator.getBattery().then(b => {
      const update = () => {
        const pct = Math.round(b.level * 100);
        const charging = b.charging ? ' ⚡' : '';
        document.getElementById('battery').textContent = `Battery: ${pct}%${charging}`;
      };
      update();
      b.addEventListener('levelchange', update);
      b.addEventListener('chargingchange', update);
    });
  } else {
    document.getElementById('battery').textContent = '';
  }

  // ── NOTIFICATION ──
  function showNotif(msg, isError) {
    let n = document.getElementById('sole-notif');
    if (!n) {
      n = document.createElement('div');
      n.id = 'sole-notif';
      n.style.cssText = `position:fixed;top:0;left:50%;transform:translateX(-50%) translateY(-80px);z-index:9999;background:rgba(10,10,10,0.95);border:1px solid rgba(255,255,255,0.15);border-top:none;border-radius:0 0 14px 14px;padding:10px 22px;font-family:'DM Sans',sans-serif;font-size:0.8rem;color:rgba(255,255,255,0.85);display:flex;align-items:center;gap:10px;box-shadow:0 8px 30px rgba(0,0,0,0.6);backdrop-filter:blur(20px);transition:transform 0.4s cubic-bezier(0.34,1.4,0.64,1);`;
      document.body.appendChild(n);
    }
    n.innerHTML = `<span style="font-size:0.6rem">${isError ? '🔴' : '⚪'}</span> ${msg}`;
    n.style.transform = 'translateX(-50%) translateY(0)';
    clearTimeout(n._t);
    n._t = setTimeout(() => { n.style.transform = 'translateX(-50%) translateY(-80px)'; }, 3500);
  }

  // ── BROWSE BAR ──
  let browseOpen = false;
  function toggleBrowse() {
    browseOpen = !browseOpen;
    document.getElementById('browse-bar').classList.toggle('open', browseOpen);
    if (browseOpen) setTimeout(() => document.getElementById('url-input').focus(), 50);
  }

  document.getElementById('url-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') triggerGo();
    if (e.key === 'Escape') toggleBrowse();
  });
  document.getElementById('go-btn').addEventListener('click', triggerGo);

  let pendingUrl = '';

  function buildUrl(url) {
    return __uv$config.prefix + __uv$config.encodeUrl(url);
  }

  function triggerGo() {
    let val = document.getElementById('url-input').value.trim();
    if (!val) return;
    if (!/^https?:\/\//i.test(val)) {
      if (val.includes('.') && !val.includes(' ')) val = 'https://' + val;
      else val = 'https://duckduckgo.com/?q=' + encodeURIComponent(val);
    }
    pendingUrl = val;
    launchProxy();
  }

  function launchProxy() {
    const url = pendingUrl;
    if (!url) return;
    const proxied = buildUrl(url);

    switch (selectedMode) {
      case 'ab': {
        const w = window.open('about:blank', '_blank');
        if (!w) { showNotif('Popup blocked — allow popups for this site', true); return; }
        showNotif('Opening in about:blank…');
        w.document.write(`<style>*{margin:0;padding:0}html,body,iframe{width:100%;height:100%;border:none;display:block;position:fixed;inset:0}</style><iframe src="${proxied}" allowfullscreen></iframe>`);
        w.document.close();
        break;
      }
      case 'blob': {
        const html = `<!DOCTYPE html><html><head><style>*{margin:0;padding:0}iframe{border:none;width:100vw;height:100vh;display:block}</style></head><body><iframe src="${proxied}" allowfullscreen></iframe></body></html>`;
        const blob = new Blob([html], { type: 'text/html' });
        const w = window.open(URL.createObjectURL(blob), '_blank');
        if (!w) { showNotif('Popup blocked — allow popups for this site', true); return; }
        showNotif('Opening via blob…');
        break;
      }
      case 'iframe': {
        showNotif('Loading in current tab…');
        setTimeout(() => { location.href = proxied; }, 400);
        break;
      }
      case 'ac': {
        const w = window.open('about:blank', '_blank');
        if (!w) { showNotif('Popup blocked — allow popups for this site', true); return; }
        showNotif('Opening via about:blank + anchor…');
        const a = w.document.createElement('a');
        a.href = proxied;
        w.document.body.appendChild(a);
        a.click();
        break;
      }
      case 'bc': {
        const html = `<!DOCTYPE html><html><body><a id="l" href="${proxied}"></a><script>document.getElementById('l').click()<\/script></body></html>`;
        const blob = new Blob([html], { type: 'text/html' });
        const w = window.open(URL.createObjectURL(blob), '_blank');
        if (!w) { showNotif('Popup blocked — allow popups for this site', true); return; }
        showNotif('Opening via blob + anchor…');
        break;
      }
      case 'mc': {
        showNotif('Opening in current tab…');
        setTimeout(() => { location.href = proxied; }, 400);
        break;
      }
    }
  }

  document.addEventListener('click', e => {
    if (browseOpen && !document.getElementById('browse-bar').contains(e.target) && e.target.id !== 'btn-browse') {
      browseOpen = false;
      document.getElementById('browse-bar').classList.remove('open');
    }
  });
</script>
</body>
</html>
